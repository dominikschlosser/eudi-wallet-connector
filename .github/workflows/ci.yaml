name: Validate Config

on:
  push:
    branches:
      - '**'
  pull_request:
    branches:
      - '**'
  workflow_dispatch: { }

jobs:
  validate:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v5

      - name: Check shell scripts
        run: |
          for script in scripts/*.sh; do
            sh -n "$script"
          done

      - name: Validate base realm JSON
        run: jq empty config/realm-wallet-connector-base.json

      - name: Generate local realm JSON
        run: scripts/setup-local-realm.sh --local-wallet

      - name: Validate generated realm JSON
        run: jq empty generated/realm-wallet-connector-local.json

      - name: Validate Docker Compose config
        run: docker compose config
